   #[1st-01] -  DNS \ NTP    

    - AND,((OR,((DST-PORT,53),(DST-PORT,853))),(NOT,((GEOIP,CN)))) , 📡.<DNS>—GlobalDNS                              #                                        # [1st-02]  [ Default : US          ]      Global NTP ：当目标端口为 53 且非中国 IP 时，走 GlobalNDS 代理     
    - RULE-SET        , GlobalDNS_Domain                           , 📡.<DNS>—GlobalDNS                              #                                        # [1st-02]  [ Default : US          ]      https://github.com/Accademia/Additional_Rule_For_Clash                                        安全DNS - GlobalDNS    # 无日志的安全DNS 
    - RULE-SET        , GlobalDNS_IP                               , 📡.<DNS>—GlobalDNS                              #                                        # [1st-02]  [ Default : US          ]      https://github.com/Accademia/Additional_Rule_For_Clash                                        安全DNS - GlobalDNS    # 无日志的安全DNS 

    - GEOSITE         , category-httpdns-cn                        , 📡.<DNS>—HttpDNS                  , no-track    #                                        # [1st-06]  [ Default : Reject      ]      
    - RULE-SET        , BlockHttpDNS_Do_Resolve                    , 📡.<DNS>—HttpDNS                  , no-track    # , no-resolve                           # [1st-06]  [ Default : Reject      ]      https://github.com/blackmatrix7/ios_rule_script/tree/master/rule/Clash/BlockHttpDNS           反跟踪 - BlockHttpDNS        
    - RULE-SET        , BlockHttpDNSPlus_Do_Resolve                , 📡.<DNS>—HttpDNS                  , no-track    # , no-resolve                           # [1st-06]  [ Default : Reject      ]      https://github.com/Accademia/Additional_Rule_For_Clash/tree/master/BlockHttpDNSPlus           反跟踪 - BlockHttpDNSPlus   

    - AND,((OR,((DST-PORT,53),(DST-PORT,853))),(GEOIP,CN))         , 📡.<DNS>—ChinaDNS                                                                        # [1st-02]  [ Default : CN          ]      Global NTP ：当目标端口为 53 且中国 IP 时，走 ChinaNDS 代理     
    - RULE-SET        , ChinaDNS_Domain                            , 📡.<DNS>—ChinaDNS                 , no-track    #                                        # [1st-06]  [ Default : RCN                https://github.com/Accademia/Additional_Rule_For_Clash/tree/master/ChinaDNS                   反泄漏 - ChinaDNS                  
    - RULE-SET        , ChinaDNS_IP                                , 📡.<DNS>—ChinaDNS                 , no-track    #                                        # [1st-06]  [ Default : RCN                https://github.com/Accademia/Additional_Rule_For_Clash/tree/master/ChinaDNS                   反泄漏 - ChinaDNS       


    - AND,((NETWORK,udp),(DST-PORT,123),(NOT,((GEOIP,CN))))        , 📡.<NTP>—GlobalNTP                              #                                        # Global NTP ：仅当目标为 UDP 且目的端口为 123 且非中国 IP 时，走 GlobalNTP 代理     
    - AND,((NETWORK,udp),(DST-PORT,123),(GEOIP,CN))                , 📡.<NTP>—ChinaNTP                               #                                        # China NTP  ：仅当目标为 UDP 且目的端口为 123 且为中国 IP 时，走 ChinaNTP 代理      

