   #  说明文档 ： 路由规则（Rule）  -  大纲！！！ 总计九级 
   # ----------------------------------------------------- 
   #      [第一级] 分流规则   :  前置规则（如局域网）      
   # -----------------------------------------------------                      
   #      [第二级] 分流规则   :  APP、网站                 
   # -----------------------------------------------------                      
   #      [第三级] 分流规则   :  GFWList                    
   # -----------------------------------------------------                      
   #      [第五级] 分流规则   :  大厂                      
   # -----------------------------------------------------                      
   #      [第四级] 分流规则   :  使用者所在国、回国（如CN）             
   # -----------------------------------------------------                    
